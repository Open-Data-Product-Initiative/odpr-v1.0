useCase:
  id: UC-001
  name:
    en: Event Demand Forecasting
  description:
    en: Forecast event-related demand to improve mobility planning and citizen services.
  domains:
    - smart-city
    - mobility
  stakeholders:
    - Mobility Planners
    - Event Operations Teams
    - Citizen Service Teams
  businessChallenge:
    en: Event demand changes quickly and affects road congestion, transit load, staffing, and public service planning.
  decision:
    en: Decide where and when additional mobility capacity and public services are needed around planned events.
  expectedOutcome:
    en: Better event response, reduced congestion, and improved citizen experience during high-demand periods.
  kpis:
    - Event travel delay reduction
    - Public transport capacity utilization
    - Citizen service response time
  dataNeeds:
    summary:
      en: Requires event schedules, expected attendance, road congestion, public transport capacity, and incident reports.
    items:
      - Event schedules and expected attendance
      - Road congestion and journey time data
      - Public transport capacity and ridership data
      - Incident and service disruption reports
  scoring:
    businessValue: high
    effort: medium
    category: juicyAndWorthIt
    score: 3.0
  status: active
  priority: high
  tags:
    - events
    - forecasting
    - mobility
