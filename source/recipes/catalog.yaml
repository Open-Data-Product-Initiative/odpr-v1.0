schema: https://opendataproducts.org/odpr-v1.0/schema/odpr.yaml
version: "1.0"
kind: RecipeCatalog
recipeCatalog:
  metadata:
    id: RCP-CATALOG-001
    name:
      en: ODPR Example Recipe Catalog
    description:
      en: Metadata-only discovery catalog for canonical ODPR recipe examples.
  recipes:
    - path: recipes/examples/minimal.yaml
      id: RCP-DEV-001
      version: "1.0.0"
      type: dev
      name:
        en: Local Fragment Draft
      description:
        en: Generate draft ODPC fragments locally for fast iteration.
      tags:
        - dev
      environment: development
      executionMode: local
      providerRef: local-fast
      commands:
        - generate
    - path: recipes/examples/ci-validate-generated-fragments.yaml
      id: RCP-CI-001
      version: "1.0.0"
      type: ci
      name:
        en: CI Validate Generated Fragments
      description:
        en: Generate and validate draft fragments during CI.
      tags:
        - ci
        - validation
      environment: ci
      executionMode: local
      providerRef: local-fast
      contextFormat: gcf
      requiresReview: false
      commands:
        - generate
        - validate
    - path: recipes/examples/release-portfolio-review.yaml
      id: RCP-RELEASE-001
      version: "1.0.0"
      type: release
      name:
        en: Release Portfolio Review
      description:
        en: Refresh, localize, explain, and review a portfolio before release.
      tags:
        - release
        - portfolio
      environment: production
      executionMode: hosted
      providerRef: production-quality
      contextFormat: gcf
      requiresReview: true
      commands:
        - portfolio.refresh
        - portfolio.localize
        - portfolio.explain
    - path: recipes/examples/portfolio-localization.yaml
      id: RCP-LOCALIZATION-001
      version: "1.0.0"
      type: localization
      name:
        en: Portfolio Localization
      description:
        en: Localize a portfolio workspace into target languages.
      tags:
        - localization
        - portfolio
      environment: production
      executionMode: hosted
      providerRef: production-quality
      contextFormat: gcf
      requiresReview: true
      commands:
        - portfolio.localize
    - path: recipes/examples/hybrid-graph-review.yaml
      id: RCP-HYBRID-001
      version: "1.0.0"
      type: hybrid
      name:
        en: Hybrid Graph Review
      description:
        en: Infer graph context locally and generate hosted review notes.
      tags:
        - hybrid
        - graph
      environment: staging
      executionMode: hybrid
      contextFormat: gcf
      requiresReview: true
      commands:
        - odpg.build
        - generate
        - portfolio.explain
