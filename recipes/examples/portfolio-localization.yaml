schema: https://opendataproducts.org/odpr-v1.0/schema/odpr.yaml
version: "1.0"
kind: Recipe
recipe:
  metadata:
    id: RCP-LOCALIZATION-001
    name:
      en: Portfolio Localization
    description:
      en: Localize a portfolio workspace into configured target languages.
    tags:
      - localization
      - portfolio
  version: "1.0.0"
  type: localization
  environment: production
  execution:
    mode: hosted
    providerRef: production-quality
  context:
    format: gcf
    fallback:
      - toon
      - yaml
  steps:
    - id: localize-portfolio
      command: portfolio.localize
      with:
        workspace: portfolio/
        languages:
          - fi
          - sv
        defaultLanguage: en
  outputs:
    - id: localized-portfolio-fi
      path: portfolio/index.fi.html
      kind: html
    - id: localized-portfolio-sv
      path: portfolio/index.sv.html
      kind: html
  gates:
    - id: localized-pages-reviewed
      type: review
      required: true
  review:
    required: true
    reviewer: release-owner
    instructions:
      en: Review localized pages before publication.
