<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title }}</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f7f8f5;
      --text: #18201a;
      --muted: #5e6b60;
      --line: #d9dfd6;
      --panel: #ffffff;
      --accent: #006d1d;
    }
    * {
      -webkit-box-sizing: border-box;
              box-sizing: border-box;
    }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 16px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    main {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 32px 0 48px;
    }
    a {
      color: var(--accent);
    }
    .odp-header {
      padding: 24px 0;
      border-bottom: 1px solid var(--line);
    }
    .odp-header h1 {
      margin: 0 0 8px;
      font-size: clamp(2rem, 5vw, 4rem);
      line-height: 1;
      letter-spacing: 0;
    }
    .odp-id,
    .odp-description,
    .odp-graph {
      margin: 6px 0;
      color: var(--muted);
    }
    .odp-summary {
      padding: 24px 0;
    }
    .odp-summary ul {
      display: -ms-grid;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      padding: 0;
      margin: 0;
      list-style: none;
    }
    .odp-summary li,
    .odp-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 16px;
    }
    .odp-count {
      display: block;
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
    }
    .odp-section {
      padding: 8px 0 24px;
    }
    .odp-section h2 {
      margin: 0 0 12px;
      font-size: 1.35rem;
    }
    .odp-card {
      margin: 12px 0;
    }
    .odp-card h3 {
      margin: 0;
      font-size: 1.1rem;
    }
    .odp-facts {
      display: -ms-grid;
      display: grid;
      -ms-grid-columns: -webkit-max-content 1fr;
      -ms-grid-columns: max-content 1fr;
      grid-template-columns: -webkit-max-content 1fr;
      grid-template-columns: max-content 1fr;
      gap: 6px 12px;
      margin: 12px 0 0;
    }
    .odp-facts dt {
      color: var(--muted);
      font-weight: 700;
    }
    .odp-facts dd {
      margin: 0;
    }
    .odp-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      padding: 0;
      margin: 12px 0 0;
      list-style: none;
    }
    .odp-tags li {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 8px;
      color: var(--muted);
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <main>
    {{ catalog_header }}
    {{ summary }}
    {{ product_references }}
    {{ use_cases }}
    {{ business_objectives }}
    {{ signals }}
  </main>
</body>
</html>
